<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand slide-text">Contact Us</span>
    </div>
</nav>

<!-- Form -->
<div class="container">
    <div class="contact-container text-white">

        <h3 class="text-center mb-4">Get in Touch</h3>

        <form id="contactForm">

            <div class="form-group">
                <input type="text" id="name" class="form-control" placeholder=" ">
                <label>Full Name</label>
            </div>

            <div class="form-group">
                <input type="text" id="email" class="form-control" placeholder=" ">
                <label>Email Address</label>
            </div>

            <div class="form-group">
                <input type="text" id="subject" class="form-control" placeholder=" ">
                <label>Subject</label>
            </div>

            <div class="form-group">
                <textarea id="message" class="form-control" rows="4" placeholder=" "></textarea>
                <label>Message</label>
            </div>

            <div id="errorMsg" class="text-danger mb-3"></div>

            <button type="submit" class="btn btn-custom w-100">Send Message</button>
        </form>

    </div>
</div>

<footer>
    <p>2026 StudyHub</p>
</footer>
